<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Infinity Variedades</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .filter-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: var(--clr-surface);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--clr-border);
        }
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--clr-bg);
            border-radius: var(--radius-full);
            padding: 0.5rem 1rem;
            flex-grow: 1;
            max-width: 400px;
            border: 1px solid var(--clr-border);
            transition: var(--transition);
        }
        .search-bar:focus-within {
            border-color: var(--clr-primary);
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }
        .search-bar input {
            border: none;
            background: none;
            outline: none;
            padding: 0.5rem;
            width: 100%;
            color: var(--clr-text);
            font-family: var(--font-body);
        }
        .category-filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .filter-pill {
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-full);
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            color: var(--clr-text);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .filter-pill:hover,
        .filter-pill.active {
            background: var(--clr-primary);
            color: white;
            border-color: var(--clr-primary);
        }
        .no-results {
            text-align: center;
            padding: 4rem 0;
            grid-column: 1 / -1;
            color: var(--clr-text-light);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav">
            <a href="index.html" class="nav-brand">
                <img src="assets/img/logoPNG.png" alt="Infinity Variedades" style="height: 90px; object-fit: contain;">
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="produtos.html?cat=promocoes" class="nav-link">Promoções</a>
                <a href="produtos.html?cat=novidades" class="nav-link">Novidades</a>
                <a href="produtos.html?cat=criancas" class="nav-link">Crianças</a>
                <a href="produtos.html" class="nav-link active">Todos os Produtos</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="action-btn" title="Minha Conta">
                    <i class='bx bx-user'></i>
                </a>
                <a href="admin.php" class="action-btn" title="Painel Admin">
                    <i class='bx bxs-dashboard'></i>
                </a>
                <button class="action-btn" id="theme-toggle" title="Mudar Tema">
                    <i class='bx bxs-moon'></i>
                </button>
                <a href="carrinho.html" class="action-btn" title="Carrinho">
                    <i class='bx bx-shopping-bag'></i>
                    <span class="cart-badge" id="cart-badge" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </header>
    <main class="section">
        <div class="container">
            <h1 class="section-title" style="margin-bottom: 2rem;">Nossa Coleção</h1>
            <div class="filter-header">
                <div class="category-filters" id="category-filters">
                    <button class="filter-pill active" data-cat="all">Todos</button>
                    <button class="filter-pill" data-cat="promocoes">Promoções</button>
                    <button class="filter-pill" data-cat="novidades">Novidades</button>
                    <button class="filter-pill" data-cat="criancas">Crianças</button>
                    <button class="filter-pill" data-cat="cadernos">Cadernos</button>
                    <button class="filter-pill" data-cat="canetas">Canetas & Lápis</button>
                    <button class="filter-pill" data-cat="mochilas">Mochilas</button>
                    <button class="filter-pill" data-cat="costura">Costura & Bordados</button>
                </div>
                <div class="search-bar">
                    <select id="brand-filter" style="display: none; border: none; background: transparent; color: var(--clr-text); outline: none; padding-right: 0.5rem; border-right: 1px solid var(--clr-border); margin-right: 0.5rem; font-family: var(--font-body); font-weight: 500;">
                        <option value="all">Todas as Marcas</option>
                    </select>
                    <i class='bx bx-search' style="color: var(--clr-text-light); font-size: 1.25rem;"></i>
                    <input type="text" id="search-input" placeholder="Buscar produtos...">
                </div>
            </div>
            <div class="product-grid" id="catalog-grid">
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; <script>document.write(new Date().getFullYear())</script> Infinity Variedades.
            </div>
        </div>
    </footer>
    <script src="assets/js/core/db.js?v=5"></script>
    <script src="assets/js/core/app.js?v=5"></script>
    <script src="assets/js/pages/produtos.js?v=5"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar E-mail - Infinix Loja</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .verify-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .verify-card {
            background: var(--clr-surface);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .code-inputs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }
        .code-input {
            width: 50px;
            height: 60px;
            font-size: 2rem;
            text-align: center;
            border: 2px solid var(--clr-border);
            border-radius: var(--radius-md);
            background: var(--clr-bg);
            color: var(--clr-text);
            font-weight: bold;
            outline: none;
            transition: var(--transition);
        }
        .code-input:focus {
            border-color: var(--clr-primary);
            box-shadow: 0 0 0 3px rgba(255,182,193,0.3);
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <i class='bx bx-envelope' style="font-size: 4rem; color: var(--clr-primary); margin-bottom: 1rem;"></i>
            <h2>Verifique seu E-mail</h2>
            <p style="color: var(--clr-text-light); margin-top: 1rem;">
                Enviamos um código de 6 dígitos para <br><strong id="user-email">...</strong>
            </p>

            <div class="code-inputs" id="otp-container">
                <input type="text" maxlength="1" class="code-input" autofocus>
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
            </div>

            <button id="btn-verify" class="btn btn-primary" style="width: 100%; height: 50px;">Confirmar Código</button>
            <p style="margin-top: 1.5rem; font-size: 0.875rem;">
                Não recebeu? <a href="#" id="resend-link" style="color: var(--clr-primary); font-weight: 600;">Reenviar e-mail</a>
            </p>
        </div>
    </div>

    <script src="assets/js/core/db.js"></script>
    <script>
        const email = new URLSearchParams(window.location.search).get('email');
        if (!email) window.location.href = 'login.html';
        document.getElementById('user-email').textContent = email;

        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        document.getElementById('btn-verify').addEventListener('click', async () => {
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length < 6) return alert('Digite o código completo.');

            const btn = document.getElementById('btn-verify');
            btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i>';
            btn.disabled = true;

            try {
                const res = await fetch('api/auth.php?action=verify_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('E-mail verificado com sucesso!');
                    window.location.href = 'index.html';
                } else {
                    alert(data.message);
                    btn.innerHTML = 'Confirmar Código';
                    btn.disabled = false;
                }
            } catch (e) {
                alert('Erro na conexão.');
                btn.innerHTML = 'Confirmar Código';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

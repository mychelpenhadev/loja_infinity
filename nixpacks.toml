# Nixpacks configuration for Infinity Store (Laravel 13)

[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22"]

[phases.build]
cmds = [
    "composer install --no-interaction --prefer-dist --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
cmd = "bash railway-run.sh"
